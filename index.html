<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="MyBigStats : explorer les sports, les athlètes, les équipes et les rencontres à venir." />
    <title>MyBigStats</title>
    <script>
      try {
        var savedTheme = localStorage.getItem("mybigstats:theme");
        document.documentElement.setAttribute("data-theme", savedTheme === "light" ? "light" : "dark");
      } catch (error) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    </script>
    <link rel="stylesheet" href="./src/app/styles.css" />
  </head>
  <body>
    <main id="app"></main>
    <script src="./node_modules/echarts/dist/echarts.min.js"></script>
    <script type="module" src="./dist/main.js"></script>
  </body>
</html>
